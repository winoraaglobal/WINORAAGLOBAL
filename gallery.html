<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Winoraa</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #DDE3E9;
            color: #333;
        }

        /* Navbar specific for this dark page */
        .navbar {
            background-color: #1a1a1a;
            padding: 20px 0;
            position: relative;
            z-index: 100;
        }

        .nav-logo h1 a {
            color: #fff !important;
        }

        .nav-link {
            color: #ccc !important;
        }

        .nav-link:hover {
            color: #fff !important;
        }

        /* Hero Section for Gallery */
        .gallery-hero {
            background-color: #1a1a1a;
            color: #fff;
            text-align: center;
            padding: 100px 0 120px;
            position: relative;
            border-bottom-left-radius: 80px;
            border-bottom-right-radius: 80px;
            margin-bottom: 0;
            z-index: 2;
        }

        .hero-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 900;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
        }

        .hero-title .solid {
            color: #fff;
        }

        .hero-title .outline {
            color: transparent;
            -webkit-text-stroke: 2px #fff;
        }

        /* Gallery Grid Layout */
        .gallery-section {
            padding: 80px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-grid {
            column-count: 3;
            column-gap: 20px;

        }

        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(77, 171, 247, 0.3);
        }

        .gallery-img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover .gallery-img {
            transform: scale(1.05);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            box-sizing: border-box;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-caption {
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            transform: translateY(20px);
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .gallery-caption {
            transform: translateY(0);
        }

        @media (max-width: 900px) {
            .gallery-grid {
                column-count: 2;
            }
        }

        @media (max-width: 600px) {
            .gallery-grid {
                column-count: 1;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo" style="align-items: center;">
                <h1><a href="index.html" style="text-decoration: none; color: #fff !important;">WINORAA GLOBAL</a></h1>
                <p class="nav-tagline"
                    style="color: rgba(255, 255, 255, 0.7); text-align: center; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin: 0;">
                    Events and Experiences</p>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="about-events.html" class="nav-link">About</a></li>
                <li class="nav-item"><a href="index.html#services" class="nav-link">Services</a></li>
                <li class="nav-item"><a href="gallery.html" class="nav-link"
                        style="color: #4dabf7 !important;">Gallery</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Removed -->

    <!-- Gallery Section -->
    <section class="gallery-section">
        <div class="maintenance-marquee-container">
            <div class="maintenance-track">
                <span class="maintenance-text">GALLERY UNDER MAINTENANCE &nbsp;&bull;&nbsp; GALLERY UNDER MAINTENANCE
                    &nbsp;&bull;&nbsp; GALLERY UNDER MAINTENANCE &nbsp;&bull;&nbsp; </span>
                <span class="maintenance-text">GALLERY UNDER MAINTENANCE &nbsp;&bull;&nbsp; GALLERY UNDER MAINTENANCE
                    &nbsp;&bull;&nbsp; GALLERY UNDER MAINTENANCE &nbsp;&bull;&nbsp; </span>
            </div>
        </div>

        <style>
            .maintenance-marquee-container {
                overflow: hidden;
                white-space: nowrap;
                padding: 100px 0;
                background-color: transparent;
            }

            .maintenance-track {
                display: inline-block;
                animation: marquee 20s linear infinite;
            }

            .maintenance-text {
                font-family: 'Montserrat', sans-serif;
                font-weight: 900;
                /* Black/ExtraBold */
                font-size: 5rem;
                color: rgba(0, 0, 0, 0.1);
                /* Subtle color or use solid if preferred */
                color: #333;
                text-transform: uppercase;
            }

            @keyframes marquee {
                0% {
                    transform: translateX(0);
                }

                100% {
                    transform: translateX(-50%);
                }
            }

            @media (max-width: 768px) {
                .maintenance-text {
                    font-size: 3rem;
                }
            }
        </style>
    </section>

    <!-- Footer Removed -->

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true,
            offset: 100
        });
    </script>
</body>

</html>
