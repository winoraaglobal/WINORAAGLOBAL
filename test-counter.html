<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Animation Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            padding: 50px;
            text-align: center;
        }
        .hero-stats-overlay {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
        }
        .stat-item-overlay {
            text-align: center;
        }
        .stat-number-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.2rem;
            min-width: 120px;
        }
        .stat-number-overlay {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
        }
        .stat-plus {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .stat-label-overlay {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <h1>Counter Animation Test</h1>
    <p>The counters should animate when the page loads:</p>
    
    <div class="hero-stats-overlay">
        <div class="stat-item-overlay">
            <div class="stat-number-container">
                <span class="stat-number-overlay" data-target="50">0</span>
                <span class="stat-plus">+</span>
            </div>
            <div class="stat-label-overlay">EVENTS PRODUCED</div>
        </div>
        <div class="stat-item-overlay">
            <div class="stat-number-container">
                <span class="stat-number-overlay" data-target="100">0</span>
                <span class="stat-plus">+</span>
            </div>
            <div class="stat-label-overlay">HAPPY CLIENTS</div>
        </div>
        <div class="stat-item-overlay">
            <div class="stat-number-container">
                <span class="stat-number-overlay" data-target="3">0</span>
                <span class="stat-plus">+</span>
            </div>
            <div class="stat-label-overlay">YEARS EXPERIENCE</div>
        </div>
    </div>

    <script>
        // Fast timer-like counter animation for hero stats
        function animateCounters() {
            const counters = document.querySelectorAll('.stat-number-overlay[data-target]');
            
            if (counters.length === 0) {
                console.error('No counters found!');
                return;
            }
            
            counters.forEach((counter, index) => {
                const target = parseInt(counter.getAttribute('data-target'));
                const plusSign = counter.nextElementSibling;
                const hasPlus = plusSign && plusSign.classList.contains('stat-plus');
                
                // Reset counter to 0
                counter.textContent = '0';
                
                // Fast counting speed - make it even faster for timer-like effect
                const countingSpeed = target > 50 ? 8 : target > 10 ? 12 : 50;
                let current = 0;
                
                // Reduced staggered delay for faster sequence
                const startDelay = index * 100;
                
                setTimeout(() => {
                    const timer = setInterval(() => {
                        current++;
                        counter.textContent = current;
                        
                        // When counting reaches target
                        if (current >= target) {
                            clearInterval(timer);
                            
                            // Show plus sign after a brief pause
                            if (hasPlus) {
                                setTimeout(() => {
                                    plusSign.style.opacity = '1';
                                }, 150);
                            }
                        }
                    }, countingSpeed);
                }, startDelay);
            });
        }

        // Start animation when page loads
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                animateCounters();
            }, 500);
        });
    </script>
</body>
</html>
