<!DOCTYPE html>
<html>

<head>
    <title>Extract Colors</title>
</head>

<body>
    <img id="logo" src="logo.png" style="display:none;" crossorigin="anonymous">
    <div id="results">Processing...</div>
    <script>
        window.onload = function () {
            const img = document.getElementById('logo');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const colorCounts = {};

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const a = data[i + 3];

                if (a < 200) continue; // Skip transparent/semi-transparent pixels

                // Quantize colors to reduce noise (round to nearest 10)
                const qr = Math.round(r / 10) * 10;
                const qg = Math.round(g / 10) * 10;
                const qb = Math.round(b / 10) * 10;

                const key = `${qr},${qg},${qb}`;
                colorCounts[key] = (colorCounts[key] || 0) + 1;
            }

            // Sort by count
            const sortedColors = Object.entries(colorCounts).sort((a, b) => b[1] - a[1]);
            const topColors = sortedColors.slice(0, 5).map(([key]) => {
                const [r, g, b] = key.split(',');
                return `#${Number(r).toString(16).padStart(2, '0')}${Number(g).toString(16).padStart(2, '0')}${Number(b).toString(16).padStart(2, '0')}`;
            });

            document.getElementById('results').innerText = JSON.stringify(topColors);
        };
    </script>
</body>

</html>
